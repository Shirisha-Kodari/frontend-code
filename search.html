<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Browse Products — Paper &amp; Ink</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand">
      <span class="brand-logo">Paper<span class="amp">&amp;</span><span class="ink-word">Ink</span></span>
      <span class="brand-tagline">Premium Stationery</span>
    </a>
    <nav class="main-nav">
      <a href="search.html" class="active">Browse</a>
      <a href="search.html?cat=Writing">Writing</a>
      <a href="search.html?cat=Notebooks">Notebooks</a>
      <a href="search.html?cat=Art">Art</a>
      <a href="search.html?cat=Office">Office</a>
    </nav>
    <div class="header-actions">
      <a href="login.html" class="icon-btn" id="userIcon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="cart.html" class="icon-btn cart-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <h1 class="page-hero-title" id="pageTitle">All products</h1>
    <p class="page-hero-sub" id="pageSubtitle">Browse our complete stationery collection</p>
  </div>
</div>

<div class="browse-wrap">
  <div class="container">
    <div class="browse-layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Categories</div>
          <ul class="filter-list" id="catList">
            <li><button class="filter-btn active" data-cat="" onclick="setCategory(this,'','All products')">All products <span class="filter-count" id="cnt-all">0</span></button></li>
            <li><button class="filter-btn" data-cat="Writing" onclick="setCategory(this,'Writing','Writing')">Writing <span class="filter-count" id="cnt-Writing">0</span></button></li>
            <li><button class="filter-btn" data-cat="Notebooks" onclick="setCategory(this,'Notebooks','Notebooks')">Notebooks <span class="filter-count" id="cnt-Notebooks">0</span></button></li>
            <li><button class="filter-btn" data-cat="Art" onclick="setCategory(this,'Art','Art &amp; Craft')">Art &amp; Craft <span class="filter-count" id="cnt-Art">0</span></button></li>
            <li><button class="filter-btn" data-cat="Office" onclick="setCategory(this,'Office','Office')">Office <span class="filter-count" id="cnt-Office">0</span></button></li>
          </ul>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">Price range</div>
          <label class="price-option"><input type="radio" name="price" value="all" checked onchange="applyFilters()"/> All prices</label>
          <label class="price-option"><input type="radio" name="price" value="0-200" onchange="applyFilters()"/> Under &#8377;200</label>
          <label class="price-option"><input type="radio" name="price" value="200-500" onchange="applyFilters()"/> &#8377;200 – &#8377;500</label>
          <label class="price-option"><input type="radio" name="price" value="500-1000" onchange="applyFilters()"/> &#8377;500 – &#8377;1,000</label>
          <label class="price-option"><input type="radio" name="price" value="1000+" onchange="applyFilters()"/> Above &#8377;1,000</label>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">Availability</div>
          <label class="price-option"><input type="checkbox" id="inStockOnly" onchange="applyFilters()"/> In stock only</label>
        </div>
      </aside>

      <main>
        <div class="browse-topbar">
          <div>
            <h2 class="browse-heading" id="browseHeading">All products</h2>
            <p class="browse-count" id="browseCount"></p>
          </div>
          <div class="search-field">
            <input type="text" id="searchInput" placeholder="Search products…" onkeyup="if(event.key==='Enter')doSearch()"/>
            <button onclick="doSearch()">&#128269;</button>
          </div>
        </div>
        <div class="products-grid" id="productGrid">
          <div class="skeleton"></div><div class="skeleton"></div>
          <div class="skeleton"></div><div class="skeleton"></div>
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </main>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container footer-bottom">&copy; 2025 Paper &amp; Ink.</div>
</footer>

<div id="toast"></div>
<script src="js/controller.js"></script>
<script>
(function() { if (!sessionStorage.getItem('user')) window.location.replace('login.html'); })();

let allProducts = [], activeCat = '';
document.addEventListener('DOMContentLoaded', async () => {
  updateCartBadge();
  const params = new URLSearchParams(window.location.search);
  activeCat = params.get('cat') || '';
  if (activeCat) {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === activeCat);
    });
    document.getElementById('browseHeading').textContent = activeCat;
    document.getElementById('pageTitle').textContent = activeCat;
  }
  const q = params.get('q');
  if (q) document.getElementById('searchInput').value = q;
  try {
    allProducts = q
      ? await (await fetch('/api/catalogue/search/' + encodeURIComponent(q))).json()
      : await (await fetch('/api/catalogue/products')).json();
    updateCounts();
    applyFilters();
  } catch(e) {
    document.getElementById('productGrid').innerHTML = '<p style="color:#888;grid-column:1/-1;padding:2rem 0">Could not load products. Ensure the catalogue service is running.</p>';
  }
});

function updateCounts() {
  ['all','Writing','Notebooks','Art','Office'].forEach(c => {
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = c === 'all' ? allProducts.length : allProducts.filter(p => p.categories && p.categories.includes(c)).length;
  });
}

function setCategory(btn, cat, label) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = cat;
  document.getElementById('browseHeading').textContent = label || 'All products';
  applyFilters();
}

function applyFilters() {
  let list = [...allProducts];
  if (activeCat) list = list.filter(p => p.categories && p.categories.includes(activeCat));
  const price = document.querySelector('input[name="price"]:checked')?.value || 'all';
  if (price !== 'all') {
    const [lo, hi] = price === '1000+' ? [1000, Infinity] : price.split('-').map(Number);
    list = list.filter(p => p.price >= lo && p.price <= (hi || Infinity));
  }
  if (document.getElementById('inStockOnly')?.checked) list = list.filter(p => p.instock > 0);
  document.getElementById('browseCount').textContent = list.length + ' product' + (list.length !== 1 ? 's' : '') + ' found';
  const grid = document.getElementById('productGrid');
  grid.innerHTML = list.length ? list.map(renderProductCard).join('') : '<p style="grid-column:1/-1;color:#888;padding:2rem 0">No products match your filters.</p>';
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  try {
    allProducts = q
      ? await (await fetch('/api/catalogue/search/' + encodeURIComponent(q))).json()
      : await (await fetch('/api/catalogue/products')).json();
    activeCat = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === ''));
    document.getElementById('browseHeading').textContent = q ? 'Results for "' + q + '"' : 'All products';
    updateCounts(); applyFilters();
  } catch(e) { showToast('Search failed', 'warn'); }
}
</script>
</body>
</html>
