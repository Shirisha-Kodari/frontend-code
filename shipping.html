<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shipping — Paper &amp; Ink</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand">
      <span class="brand-logo">Paper<span class="amp">&amp;</span><span class="ink-word">Ink</span></span>
      <span class="brand-tagline">Premium Stationery</span>
    </a>
    <div class="header-actions">
      <a href="cart.html" class="icon-btn cart-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
      </a>
    </div>
  </div>
</header>

<div class="container" style="padding-top:44px;padding-bottom:84px">
  <div class="steps-bar">
    <div class="step done"><span class="step-num">✓</span> Cart</div>
    <div class="step-divider"></div>
    <div class="step active"><span class="step-num">2</span> Shipping</div>
    <div class="step-divider"></div>
    <div class="step"><span class="step-num">3</span> Payment</div>
  </div>
  <h1 class="page-title">Delivery details</h1>
  <div class="checkout-layout">
    <div>
      <div class="form-card">
        <h3 class="form-card-title">Your delivery address</h3>
        <p class="form-card-hint">Enter your shipping details so we can calculate delivery cost and time.</p>
        <div class="form-grid-2">
          <div class="form-row">
            <label class="form-label">First name</label>
            <input type="text" class="form-input" placeholder="Rahul"/>
          </div>
          <div class="form-row">
            <label class="form-label">Last name</label>
            <input type="text" class="form-input" placeholder="Sharma"/>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">Street address</label>
          <input type="text" class="form-input" placeholder="123, MG Road"/>
        </div>
        <div class="form-grid-2">
          <div class="form-row">
            <label class="form-label">Pincode</label>
            <input type="text" class="form-input" placeholder="560001"/>
          </div>
          <div class="form-row">
            <label class="form-label">Phone</label>
            <input type="text" class="form-input" placeholder="9876543210"/>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">Delivery city</label>
          <select id="citySelect" class="form-input" onchange="calcShipping()">
            <option value="">-- Choose your city --</option>
            <optgroup label="North India">
              <option>Delhi</option><option>Noida</option><option>Gurugram</option>
              <option>Agra</option><option>Jaipur</option><option>Lucknow</option>
              <option>Chandigarh</option><option>Amritsar</option><option>Ludhiana</option>
              <option>Kanpur</option><option>Varanasi</option>
            </optgroup>
            <optgroup label="West India">
              <option>Mumbai</option><option>Pune</option><option>Ahmedabad</option>
              <option>Surat</option><option>Vadodara</option><option>Nashik</option><option>Nagpur</option>
            </optgroup>
            <optgroup label="South India">
              <option>Bengaluru</option><option>Chennai</option><option>Hyderabad</option>
              <option>Kochi</option><option>Coimbatore</option><option>Visakhapatnam</option>
            </optgroup>
            <optgroup label="East India">
              <option>Kolkata</option><option>Patna</option><option>Bhubaneswar</option>
              <option>Guwahati</option><option>Bhopal</option><option>Indore</option>
            </optgroup>
          </select>
        </div>
        <div id="shipResult"></div>
        <button class="btn btn-primary btn-lg btn-block" id="proceedBtn" style="margin-top:20px;display:none" onclick="goPayment()">Continue to payment →</button>
      </div>
    </div>
    <div class="summary-card" id="orderSummary">
      <h3 class="summary-title">Order summary</h3>
      <div id="summaryInner"><p style="color:#777;font-size:13px">Loading…</p></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container footer-bottom">&copy; 2025 Paper &amp; Ink.</div>
</footer>

<div id="toast"></div>
<script src="js/controller.js"></script>
<script>
(function() { if (!sessionStorage.getItem('user')) window.location.replace('login.html'); })();
let currentCart = null, shipData = null;
document.addEventListener('DOMContentLoaded', () => { updateCartBadge(); loadSummary(); });

async function loadSummary() {
  const id = getCartId();
  try {
    const r = await fetch('/api/cart/cart/' + id);
    if (!r.ok) { window.location = 'cart.html'; return; }
    currentCart = await r.json(); renderSummary();
  } catch(e) {}
}

function renderSummary() {
  if (!currentCart) return;
  const items = (currentCart.items||[]).filter(i=>i.sku!=='SHIP');
  const sub = items.reduce((a,i)=>a+i.subtotal,0), gst = Math.round(sub*.18), sc = shipData ? shipData.cost : 0;
  document.getElementById('summaryInner').innerHTML =
    items.map(i=>`<div class="sum-row"><span>${i.name} ×${i.qty}</span><span>₹${i.subtotal.toLocaleString('en-IN')}</span></div>`).join('') +
    `<div class="sum-row" style="margin-top:8px;border-top:1.5px solid #e4ddd5;padding-top:8px"><span>Subtotal</span><span>₹${sub.toLocaleString('en-IN')}</span></div>` +
    `<div class="sum-row"><span>GST (18%)</span><span>₹${gst.toLocaleString('en-IN')}</span></div>` +
    `<div class="sum-row"><span>Shipping</span><span>${shipData ? '₹'+sc.toLocaleString('en-IN') : '—'}</span></div>` +
    `<div class="sum-total"><span>Total</span><span>₹${(sub+gst+sc).toLocaleString('en-IN')}</span></div>`;
}

async function calcShipping() {
  const city = document.getElementById('citySelect').value; if (!city) return;
  const cartId = getCartId();
  const res = document.getElementById('shipResult');
  const proceedBtn = document.getElementById('proceedBtn');

  // Reset state
  shipData = null;
  proceedBtn.style.display = 'none';
  res.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:14px 0;color:#777;font-size:14px">
    <span style="font-size:20px">⏳</span> Calculating shipping for <strong>${city}</strong>…
  </div>`;

  try {
    // Step 1: Search city by name using country code 'in' (India)
    const cityName = city.toLowerCase();
    const matchR = await fetch('/api/shipping/match/in/' + encodeURIComponent(cityName));
    if (!matchR.ok) throw new Error('City lookup failed: ' + matchR.status);
    const cities = await matchR.json();
    if (!cities || cities.length === 0) throw new Error('City "' + city + '" not found in shipping database');

    const cityUuid = cities[0].uuid;

    // Step 2: Calculate shipping cost using city uuid
    const calcR = await fetch('/api/shipping/calc/' + cityUuid);
    if (!calcR.ok) throw new Error('Shipping calc failed: ' + calcR.status);
    const d = await calcR.json();

    shipData = { distance: d.distance, cost: Math.round(d.cost), location: city, uuid: cityUuid };

    // Step 3: Save shipping to cart
    await fetch('/api/cart/shipping/' + cartId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(shipData)
    });

    res.innerHTML = `
      <div class="ship-result">
        <span class="ship-result-icon">🚛</span>
        <div>
          <strong>Shipping to ${city}</strong>
          <p>Distance: ${d.distance.toLocaleString('en-IN')} km &nbsp;·&nbsp; Estimated delivery: 3–5 business days</p>
          <p class="ship-cost">Shipping charge: ₹${Math.round(d.cost).toLocaleString('en-IN')}</p>
        </div>
      </div>`;
    proceedBtn.style.display = 'block';
    renderSummary();

  } catch(e) {
    res.innerHTML = `
      <div style="background:#fdecea;border:1.5px solid rgba(192,57,43,.2);border-radius:10px;padding:18px 20px;margin-top:16px;display:flex;gap:14px;align-items:flex-start">
        <span style="font-size:26px;flex-shrink:0">🔌</span>
        <div>
          <strong style="font-size:14px;color:#7b1a1a;display:block;margin-bottom:4px">Shipping calculation failed</strong>
          <p style="font-size:13px;color:#a93226;line-height:1.6">${e.message || 'Could not reach shipping service. Please ensure the shipping service and database are running.'}</p>
        </div>
      </div>`;
    proceedBtn.style.display = 'none';
    showToast('⚠ ' + (e.message || 'Shipping service error'), 'warn');
  }
}

function goPayment() {
  if (!shipData) { showToast('Please select a delivery city', 'warn'); return; }
  window.location = 'payment.html';
}
</script>
</body>
</html>
